# MySQL for PantryFlow (spec). Run: docker compose up -d
services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: pantryroot
      MYSQL_DATABASE: pantryflow
      MYSQL_USER: pantry
      MYSQL_PASSWORD: pantrypass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4

volumes:
  mysql_data:
