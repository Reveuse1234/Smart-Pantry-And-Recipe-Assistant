# Optional: ping the public Streamlit app so free-tier sleep happens less often.
# Uses ~1 min of GitHub Actions time per run. Disable by deleting this file.
name: Keep Streamlit awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit app
        run: |
          curl -fsS -o /dev/null -L --max-time 120 \
            "https://smart-pantry-and-recipe-assistant-c6jnsjedabfmbrga9afsbx.streamlit.app" \
            || true
